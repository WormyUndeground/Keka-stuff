<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene Builder — Keka explainer scripts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root{
    --uv:#7C46F1; --azure:#4682F1; --royal:#0F22A3;
    --grey:#EDEFF7; --graphite:#1E1E24;
    --bg:#F6F7FC; --card:#FFFFFF; --border:#E5E8F4; --muted:#6A6F86;
    --ink:#1E1E24; --soft:#F0F1F9;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(124,70,241,.18)}

  /* ---- top bar ---- */
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(246,247,252,.85); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .bar{max-width:920px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .brand h1{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; letter-spacing:-.01em; margin:0;
  }
  .brand .dot{width:9px;height:9px;border-radius:3px;background:var(--uv);transform:translateY(-1px)}
  .brand small{color:var(--muted); font-weight:500; font-size:12.5px}

  .controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .seg{display:flex; background:var(--soft); border:1px solid var(--border); border-radius:9px; padding:3px}
  .seg button{
    border:0; background:transparent; font:inherit; font-weight:600; font-size:13px;
    color:var(--muted); padding:5px 12px; border-radius:6px; cursor:pointer;
  }
  .seg button.on{background:var(--card); color:var(--uv); box-shadow:0 1px 2px rgba(30,30,36,.06)}
  .seg .lbl{align-self:center; color:var(--muted); font-size:11px; font-weight:600; padding:0 8px 0 4px; text-transform:uppercase; letter-spacing:.06em}

  button.btn{
    font:inherit; font-weight:600; font-size:13.5px; cursor:pointer;
    border:1px solid var(--border); background:var(--card); color:var(--ink);
    padding:8px 14px; border-radius:9px; transition:border-color .15s, transform .05s;
  }
  button.btn:hover{border-color:#cfd4ec}
  button.btn:active{transform:translateY(1px)}
  button.btn.primary{background:var(--uv); border-color:var(--uv); color:#fff}
  button.btn.primary:hover{background:#6b39df}
  button.btn:disabled{opacity:.45; cursor:default}
  button.btn:focus-visible, .seg button:focus-visible{outline:2px solid var(--azure); outline-offset:2px}

  /* ---- main ---- */
  main{max-width:920px; margin:0 auto; padding:28px 24px 80px}

  .drop{
    border:1.5px dashed #c9cee8; border-radius:18px; background:var(--card);
    padding:54px 28px; text-align:center; transition:border-color .15s, background .15s;
  }
  .drop.hot{border-color:var(--uv); background:#faf8ff}
  .drop h2{font-family:'Space Grotesk',sans-serif; font-size:22px; margin:0 0 6px; letter-spacing:-.01em}
  .drop p{color:var(--muted); margin:0 0 20px; max-width:460px; margin-left:auto; margin-right:auto}
  .drop .row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap}

  /* coverage strip */
  .meta{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:22px}
  .chip{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:600;
    background:var(--card); border:1px solid var(--border); border-radius:999px; padding:7px 14px;
  }
  .chip .tick{width:16px;height:16px;border-radius:50%;background:#1faa6b;display:inline-grid;place-items:center;color:#fff;font-size:10px}
  .chip.video{color:var(--royal)}
  .meta .grow{margin-left:auto; color:var(--muted); font-size:12.5px}

  /* scene card */
  .scene{
    position:relative; background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:20px 22px 22px 22px; margin-bottom:16px;
    animation:rise .35s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion: reduce){ .scene{animation:none} }

  .scene .head{display:flex; align-items:center; gap:12px; margin-bottom:14px}
  .num{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; color:#fff;
    background:var(--graphite); border-radius:8px; padding:5px 9px; letter-spacing:.02em; min-width:42px; text-align:center;
  }
  .scene.product .num{background:var(--uv)}
  .scene .name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16.5px; letter-spacing:-.01em; flex:1; min-width:120px}
  .tag{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:4px 9px; border-radius:6px}
  .tag.product{background:#f0eaff; color:#5a2fc7}
  .tag.presenter{background:#e9f0ff; color:#2c5bd6}

  .block{margin-top:14px}
  .block .lab{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px}
  .block .lab span{font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted)}
  .vo{background:var(--soft); border:1px solid var(--border); border-radius:11px; padding:12px 14px; font-size:14.5px}
  pre.prompt{
    margin:0; background:#fbfbfe; border:1px solid var(--border); border-radius:11px;
    padding:14px 15px; font-family:var(--mono); font-size:12.5px; line-height:1.65; color:#2a2c3a;
    white-space:pre-wrap; word-break:break-word;
  }
  .copy{
    font:inherit; font-weight:600; font-size:11.5px; cursor:pointer; color:var(--uv);
    background:transparent; border:1px solid #e0d8fb; border-radius:7px; padding:4px 10px; transition:background .12s;
  }
  .copy:hover{background:#f3eeff}
  .copy:focus-visible{outline:2px solid var(--azure); outline-offset:2px}
  .copy.done{color:#1faa6b; border-color:#bfe9d4}

  .note{color:var(--muted); font-size:12.5px; margin-top:18px; line-height:1.6; border-top:1px solid var(--border); padding-top:16px}
  .err{background:#fff0f0; border:1px solid #f4cccc; color:#a23b3b; border-radius:12px; padding:14px 16px; font-size:14px}

  /* toast */
  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--graphite); color:#fff; font-size:13px; font-weight:600;
    padding:10px 16px; border-radius:10px; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:50;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="dot"></span><h1>Scene Builder</h1><small>script → scene-wise voiceover + image prompts</small></div>
    <div class="controls" id="controls" style="display:none">
      <div class="seg" id="modeSeg" title="How tile labels are written">
        <span class="lbl">Labels</span>
        <button data-mode="noun" class="on">Nouns</button>
        <button data-mode="verb">Verbs</button>
      </div>
      <button class="btn" id="copyAll">Copy all</button>
      <button class="btn" id="download">Download .txt</button>
      <button class="btn" id="reset">New file</button>
    </div>
  </div>
</header>

<main>
  <div id="empty">
    <div class="drop" id="drop">
      <h2>Drop a script, get scenes</h2>
      <p>Upload the training-video Word doc. Every paragraph becomes a voiceover line and every bullet list becomes a labelled tile scene — nothing gets dropped.</p>
      <div class="row">
        <button class="btn primary" id="pick">Upload .docx</button>
        <button class="btn" id="sampleBtn">Try the sample</button>
      </div>
      <input type="file" id="file" accept=".docx" hidden>
    </div>
  </div>
  <div id="result"></div>
</main>

<div id="toast"></div>

<!-- built-in sample: parsed HTML of the NHT Core HR Fundamentals script -->
<script type="text/plain" id="sampleDoc"><p><strong>CORE HRIS</strong></p><p><strong>Video 1 – Fundamentals</strong></p><p>“Imagine managing employee information for hundreds or even thousands of employees using spreadsheets, folders, emails, and disconnected systems.</p><p>An employee joins the company.</p><p>HR has to:</p><ul><li>Collect documents</li><li>Create employee records</li><li>Update spreadsheets</li><li>Share policies</li><li>Coordinate onboarding</li><li>Assign managers</li><li>And maintain employee information manually</li></ul><p>Now imagine doing this across:</p><ul><li>Multiple teams</li><li>Multiple locations</li><li>Hybrid employees</li><li>Different departments</li><li>And continuous workforce changes</li></ul><p>This is exactly why Core HRIS systems become critical for growing organizations.</p><p>Let’s start with understanding what a Core HRIS actually is.</p><p>HRIS stands for Human Resource Information System.</p><p>A Core HRIS acts as the central system for managing employee information and HR operations across the organization.</p><p>It helps organizations:</p><ul><li>Store employee records</li><li>Manage employee lifecycle processes</li><li>Handle onboarding and exits</li><li>Maintain organizational structures</li><li>Manage HR documents</li><li>Track employee information</li><li>And improve HR process visibility</li></ul><p>But Core HRIS is not just an employee database.</p><p>It becomes the operational foundation for HR teams and employee management.</p><p>As organizations grow, managing HR operations manually becomes increasingly difficult.</p><p>Employee data keeps changing constantly.</p><p>People join.<br />People move teams.<br />People get promoted.<br />Employees resign.<br />Policies change.<br />Reporting structures evolve.</p><p>And without a centralized system, HR operations quickly become fragmented.</p><p>Now let’s understand the common challenges organizations face.</p><p>Many companies still manage employee information through:</p><ul><li>Excel sheets</li><li>Shared drives</li><li>Emails</li><li>Physical documents</li><li>And disconnected HR tools</li></ul><p>This creates major operational inefficiencies.</p><p>HR teams struggle to:</p><ul><li>Maintain accurate employee records</li><li>Track employee lifecycle changes</li><li>Manage onboarding processes</li><li>Retrieve documents quickly</li><li>And maintain organizational visibility</li></ul><p>Employees also experience operational friction.</p><p>They often depend on HR teams for:</p><ul><li>Documents</li><li>Policy information</li><li>Employee records</li><li>Leave balances</li><li>And profile updates</li></ul><p>Managers struggle with visibility as well.</p><p>They may not have clear access to:</p><ul><li>Team structures</li><li>Employee information</li><li>Reporting hierarchies</li><li>Or workforce updates</li></ul><p>Now think about the business impact.</p><p>Manual HR operations reduce efficiency significantly.</p><p>HR teams spend more time managing administrative tasks instead of focusing on strategic initiatives.</p><p>Employee experience also suffers when processes become slow or inconsistent.</p><p>Leadership teams lack centralized workforce visibility.</p><p>And as the organization scales, operational dependency on HR teams increases rapidly.</p><p>This is where Keka Core HRIS helps.</p><p>Keka Core HRIS is designed to centralize and simplify employee lifecycle management and HR operations.</p><p>Now let’s understand this using a simple framework:</p><p>Product → Feature → Value.</p><p>The product is Keka Core HRIS.</p><p>One major feature is centralized employee records.</p><p>Organizations can:</p><ul><li>Store employee information</li><li>Maintain digital profiles</li><li>Track employee lifecycle changes</li><li>And manage workforce data centrally</li></ul><p>The value is improved visibility and reduced dependency on spreadsheets and manual tracking.</p><p>Another important feature is onboarding and employee lifecycle management.</p><p>HR teams can:</p><ul><li>Automate onboarding workflows</li><li>Collect documents digitally</li><li>Assign tasks</li><li>Manage confirmations</li><li>And streamline exits</li></ul><p>The value is faster HR operations and improved employee experience.</p><p>Keka also provides document and organizational management capabilities.</p><p>Organizations can:</p><ul><li>Maintain policy documents</li><li>Track reporting structures</li><li>Manage employee letters</li><li>And centralize workforce information</li></ul><p>The value is operational consistency and easier workforce management.</p><p>Another major capability is employee self-service.</p><p>Employees can:</p><ul><li>Update profiles</li><li>Access documents</li><li>View organizational information</li><li>And complete HR-related actions independently</li></ul><p>The value is reduced HR dependency and improved employee experience.</p><p>As an SDR, the goal is not to explain HRIS features one by one.</p><p>The goal is to understand:</p><ul><li>How HR operations are managed today</li><li>Where operational inefficiencies exist</li><li>And how centralized HR systems improve operational efficiency and employee experience</li></ul><p>Always think:</p><p>Problem → Feature → Value.</p><p>Instead of saying:<br />‘Keka has employee profiles.’</p><p>Say:<br />‘Keka helps organizations centralize employee information and automate HR workflows, reducing manual operational dependency and improving employee experience.’</p><p>That is how stronger HR conversations are built.</p><p>To summarize:</p><p>Core HRIS is not just an employee database.</p><p>It directly impacts:</p><ul><li>HR efficiency</li><li>Employee experience</li><li>Workforce visibility</li><li>Process consistency</li><li>And organizational scalability</li></ul><p>And this is why growing organizations move away from manual HR operations toward centralized HR systems like Keka Core HRIS.</p><p>In the next module, we’ll understand how HR operational challenges differ across industries and business environments.”</p></script>

<script>
/* ---------------- config ---------------- */
const VERBS = new Set(['collect','create','update','share','coordinate','assign','maintain','store','manage','handle','track','retrieve','improve','view','access','complete','automate','generate','streamline','centralize','centralise','provide']);
const STRIP_TRAIL = ['manually','independently','quickly','digitally','centrally','as well'];

const PRESENTER = "Use the same recurring presenter: an adult playful enterprise avatar with mature proportions, soft sculpted face, short swept brown hair, navy-blue smart-casual jacket, plain light-grey inner shirt, graphite trousers, white sneakers, holding a dark tablet. Keep hairstyle, outfit, proportions and style identical every time; only change pose, gesture, expression and tablet angle. Medium three-quarter framing, head to mid-thigh. Clear stylised face \u2014 never blurred, blank or faceless.";
const ICON_LINE = "Icons: one cohesive soft 3D family \u2014 rounded matte objects, one main object plus at most one small supporting object, same camera angle, lighting, depth, scale and shadow softness; no text inside any icon.";
const STYLE_LINE = "STYLE: white or very pale-grey rounded tiles, thin pale border, soft shadow, graphite labels; palette mostly white, pale grey, #7C46F1, #4682F1, #0F22A3 with at most 1\u20132 soft accents (lavender, peach, mango, guava); no rainbow, no heavy gradients, no clipart; modular and visually separable, 80px safe margins, 48px between objects, nothing cropped or overlapping; no connector lines or arrows unless required;";

/* ---------------- helpers ---------------- */
function titleCase(s){
  return s.split(/\s+/).map(w=>{
    if(/^[A-Z0-9&/]{2,}$/.test(w)) return w;        // keep HR, HRIS, SDR, R&D
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  }).join(' ');
}
function cleanBullet(raw){
  let s = raw.trim().replace(/\s+/g,' ');
  s = s.replace(/^(and|or)\s+/i,'');
  STRIP_TRAIL.forEach(t=>{ s = s.replace(new RegExp('\\s+'+t+'\\.?$','i'),''); });
  return s.replace(/[.;,]$/,'').trim();
}
function labelFromBullet(raw, mode){
  let s = cleanBullet(raw);
  let words = s.split(' ');
  if(mode==='noun' && words.length>1 && VERBS.has(words[0].toLowerCase())) words = words.slice(1);
  words = words.slice(0, mode==='noun'?3:4);
  return titleCase(words.join(' '));
}
function dedupe(arr){ const seen=new Set(), out=[]; for(const x of arr){const k=x.toLowerCase(); if(!seen.has(k)){seen.add(k); out.push(x);}} return out; }
function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

function layoutFor(labels){
  const n=labels.length;
  if(n===1) return {name:'single centred tile', str:'single centred tile'};
  const map={2:[[0,1]],3:[[0,1,2]],4:[[0,1],[2,3]],5:[[0,1],[2,3,4]],6:[[0,1,2],[3,4,5]],7:[[0,1,2,3],[4,5,6]],8:[[0,1,2,3],[4,5,6,7]]};
  const names={2:'row of 2',3:'row of 3',4:'2\u00d72',5:'2-over-3',6:'3\u00d72',7:'4 top + 3 bottom',8:'4\u00d72'};
  const rows=map[n];
  if(!rows) return {name:n+' tiles', str:'balanced grid of '+n+' tiles'};
  return {name:names[n], str:rows.map((r,i)=>'row '+(i+1)+' \u2014 '+r.map(idx=>labels[idx]).join(', ')).join(' / ')};
}
function voiceoverTiles(lead, bullets){
  const items=bullets.map(b=>b.replace(/^(and|or)\s+/i,'').replace(/[.;,]$/,'').trim());
  let list = items.length===1 ? items[0] : items.slice(0,-1).join(', ')+', and '+items[items.length-1];
  return (lead?lead+': ':'')+list+'.';
}
const LEAD_FILLER=/^(now imagine doing this across|hr has to|it helps organizations|they often depend on hr teams for|organizations can|hr teams can|employees can|they may not have clear access to|many companies still manage employee information through|the goal is to understand|it directly impacts|they often depend on|many companies still manage)/i;
function nameFromLead(lead, labels){
  if(!lead) return labels.slice(0,2).join(' & ');
  let core=lead.replace(LEAD_FILLER,'').replace(/[:.]$/,'').trim();
  if(!core) core=lead.replace(/[:.]$/,'');
  return titleCase(core.split(' ').slice(0,5).join(' '));
}
function nameFromText(txt){
  const w=txt.split(' ');
  return titleCase(w.slice(0,6).join(' '))+(w.length>6?'\u2026':'');
}

/* ---------------- parse docx html -> beats ---------------- */
function parse(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const nodes=[...doc.body.children];
  const beats=[]; const title=[]; let narr=[]; let pendingLead=null; let started=false;
  let srcP=0, srcLi=0;

  const flushNarr=()=>{ if(narr.length){ beats.push({kind:'narr', text:narr.join(' ')}); narr=[]; } };
  const leadToNarr=()=>{ if(pendingLead){ narr.push(pendingLead); pendingLead=null; } };
  const HERO=/(this is where|to summari|product\s*\u2192\s*feature\s*\u2192\s*value|always think)/i;
  const strip=s=>s.replace(/^[\u201c\u2018"']+/,'').replace(/[\u201d\u2019"']+$/,'').trim();

  for(const el of nodes){
    const tag=el.tagName.toLowerCase();
    if(tag==='ul'){
      const lis=[...el.querySelectorAll('li')].map(li=>li.textContent.replace(/\s+/g,' ').trim()).filter(Boolean);
      srcLi+=lis.length;
      flushNarr();
      const lead=pendingLead?pendingLead.replace(/:$/,''):''; pendingLead=null;
      beats.push({kind:'tiles', lead, bullets:lis}); started=true;
      continue;
    }
    if(tag!=='p') continue;
    const onlyStrong = el.children.length===1 && el.children[0].tagName==='STRONG' && el.textContent.trim()===el.children[0].textContent.trim();
    const raw=el.textContent.replace(/\s+/g,' ').trim();
    const txt=strip(raw);
    if(!txt) continue;
    if(onlyStrong && !started){ title.push(txt); continue; }
    srcP++;

    if(el.querySelector('br')){
      leadToNarr();
      const lines=el.innerHTML.split(/<br\s*\/?>/i).map(s=>{const d=doc.createElement('div'); d.innerHTML=s; return strip(d.textContent.replace(/\s+/g,' '));}).filter(Boolean);
      const tileLike = lines.length>=3 && lines.every(l=>l.split(' ').length<=6);
      if(tileLike){ flushNarr(); beats.push({kind:'tiles', lead:'', bullets:lines}); started=true; }
      else { narr.push(lines.join(' ')); if(narr.length>=2) flushNarr(); }
      continue;
    }
    if(/:$/.test(raw)){ leadToNarr(); flushNarr(); pendingLead=txt; started=true; continue; }
    if(HERO.test(txt)){ leadToNarr(); flushNarr(); beats.push({kind:'narr', text:txt, hero:true}); started=true; continue; }
    leadToNarr(); narr.push(txt); started=true; if(narr.length>=2) flushNarr();
  }
  leadToNarr(); flushNarr();
  return {title, beats, srcP, srcLi};
}

/* ---------------- beats -> scenes ---------------- */
function build(parsed, mode){
  const scenes=[];
  for(const b of parsed.beats){
    if(b.kind==='narr'){
      const txt=b.text.trim();
      scenes.push({type:'presenter', name:nameFromText(txt), concept:'presenter delivering a teaching or transition moment to camera',
        labels:[], layout:null, voiceover:txt, logo:/keka/i.test(txt)});
    } else {
      const tileLike = b.bullets.length && b.bullets.every(x=>{const c=cleanBullet(x); return c.split(' ').length<=5 && !/^(how|where|why|when|whether)\b/i.test(c);});
      if(!tileLike){
        const vo=voiceoverTiles(b.lead, b.bullets);
        scenes.push({type:'presenter', name:nameFromLead(b.lead,[])||nameFromText(vo), concept:'presenter delivering a teaching or transition moment to camera',
          labels:[], layout:null, voiceover:vo, logo:/keka/i.test(vo)});
        continue;
      }
      const labelsAll=dedupe(b.bullets.map(x=>labelFromBullet(x,mode)));
      const size = labelsAll.length<=8 ? labelsAll.length : 6;
      const groups=chunk(labelsAll, size);
      groups.forEach((labs,ci)=>{
        scenes.push({
          type:'product',
          name: nameFromLead(b.lead, labs)+(groups.length>1?' ('+(ci+1)+'/'+groups.length+')':''),
          concept: b.lead ? '\u201c'+b.lead+'\u201d shown as a labelled tile grid' : 'a labelled tile grid of related items',
          labels: labs,
          layout: layoutFor(labs),
          voiceover: ci===0 ? voiceoverTiles(b.lead, b.bullets) : '(continues the previous scene\u2019s narration)',
          logo: /keka/i.test((b.lead||'')+' '+b.bullets.join(' '))
        });
      });
    }
  }
  return scenes;
}

/* ---------------- assemble image prompt ---------------- */
function imagePrompt(s){
  const L=[];
  L.push('1536\u00d71024 landscape, premium SaaS explainer, pure white studio background (#FFFFFF).');
  L.push('Scene: '+s.concept+'.');
  L.push('Characters: '+(s.type==='product' ? 'No character \u2014 modular product tiles and soft 3D product icons only.' : PRESENTER));
  if(s.labels.length){
    L.push('Tiles (exactly '+s.labels.length+', each label once): '+s.labels.join(', ')+'.');
    L.push('Layout: '+s.layout.str+'.');
    L.push(ICON_LINE);
    L.push('TEXT LOCK: the only visible words are these exact labels \u2014 '+s.labels.join(', ')+'. No other text anywhere.');
  } else {
    L.push('Visual: one clean focal concept, no tile grid.');
    L.push('TEXT LOCK: no visible words anywhere in the image.');
  }
  L.push(STYLE_LINE+' '+(s.logo?'Keka logo once, subtle, top-right.':'no logo.'));
  return L.join('\n');
}
function pad(n){return String(n).padStart(2,'0');}
function exportAll(scenes){
  const div='\u2501'.repeat(40);
  return scenes.map((s,i)=>{
    return div+'\nSCENE '+pad(i+1)+' \u00b7 '+s.name+' \u00b7 '+(s.type==='product'?'product-only':'presenter-led')+
      '\n\nVOICEOVER:\n"'+s.voiceover+'"\n\nIMAGE PROMPT:\n'+imagePrompt(s);
  }).join('\n\n')+'\n'+div+'\n';
}

/* ---------------- render ---------------- */
let CURRENT_HTML=null, MODE='noun';

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1400); }
function copyText(txt, btn){
  navigator.clipboard.writeText(txt).then(()=>{
    if(btn){const o=btn.textContent; btn.textContent='Copied'; btn.classList.add('done'); setTimeout(()=>{btn.textContent=o; btn.classList.remove('done');},1200);}
    toast('Copied to clipboard');
  }).catch(()=>toast('Copy failed \u2014 select and copy manually'));
}

function render(){
  if(!CURRENT_HTML) return;
  let parsed, scenes;
  try{ parsed=parse(CURRENT_HTML); scenes=build(parsed, MODE); }
  catch(e){ document.getElementById('result').innerHTML='<div class="err">Could not parse that document. It may be an unusual layout. Error: '+(e.message||e)+'</div>'; return; }

  document.getElementById('empty').style.display='none';
  document.getElementById('controls').style.display='flex';

  const titleStr = parsed.title.join(' \u2014 ') || 'Untitled script';
  const res=document.getElementById('result');
  res.innerHTML='';

  const meta=document.createElement('div'); meta.className='meta';
  meta.innerHTML =
    '<span class="chip video">\u25b6 '+escapeHtml(titleStr)+'</span>'+
    '<span class="chip"><span class="tick">\u2713</span> '+scenes.length+' scenes \u00b7 '+parsed.srcP+' paragraphs + '+parsed.srcLi+' bullets mapped \u00b7 0 dropped</span>'+
    '<span class="grow">Every source line lands in a scene by construction</span>';
  res.appendChild(meta);

  scenes.forEach((s,i)=>{
    const card=document.createElement('div'); card.className='scene '+s.type;
    const prompt=imagePrompt(s);
    card.innerHTML =
      '<div class="head"><span class="num">S'+pad(i+1)+'</span>'+
      '<span class="name">'+escapeHtml(s.name)+'</span>'+
      '<span class="tag '+s.type+'">'+(s.type==='product'?'Product':'Presenter')+'</span></div>'+
      '<div class="block"><div class="lab"><span>Voiceover</span><button class="copy" data-c="vo">Copy</button></div>'+
      '<div class="vo">'+escapeHtml(s.voiceover)+'</div></div>'+
      '<div class="block"><div class="lab"><span>Image prompt \u2014 paste into image tool</span><button class="copy" data-c="ip">Copy prompt</button></div>'+
      '<pre class="prompt">'+escapeHtml(prompt)+'</pre></div>';
    card.querySelector('[data-c="vo"]').addEventListener('click',e=>copyText(s.voiceover,e.target));
    card.querySelector('[data-c="ip"]').addEventListener('click',e=>copyText(prompt,e.target));
    res.appendChild(card);
  });

  const note=document.createElement('div'); note.className='note';
  note.innerHTML='Built deterministically: paragraphs \u2192 voiceover, bullet lists \u2192 tile scenes, all style locks baked into every prompt so each is self-contained. Heuristic parts you may want to tweak by hand: scene <b>names</b>, the product-vs-presenter <b>type</b> on text-only scenes, and tile <b>label</b> wording (toggle Nouns/Verbs above). Image rendering still happens in your image tool \u2014 this app prepares the prompts, it doesn\u2019t generate pictures.';
  res.appendChild(note);

  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.mode===MODE));
  window.__scenes=scenes;
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------------- file handling ---------------- */
function readDocx(file){
  if(!file) return;
  if(!/\.docx$/i.test(file.name)){ toast('Please upload a .docx file'); return; }
  const r=new FileReader();
  r.onload=ev=>{
    mammoth.convertToHtml({arrayBuffer:ev.target.result})
      .then(out=>{ CURRENT_HTML=out.value; render(); })
      .catch(err=>{ document.getElementById('result').innerHTML='<div class="err">Failed to read the Word file: '+(err.message||err)+'</div>'; });
  };
  r.readAsArrayBuffer(file);
}

/* ---------------- wire up ---------------- */
document.getElementById('pick').addEventListener('click',()=>document.getElementById('file').click());
document.getElementById('file').addEventListener('change',e=>readDocx(e.target.files[0]));
document.getElementById('sampleBtn').addEventListener('click',()=>{
  CURRENT_HTML=document.getElementById('sampleDoc').textContent.trim(); render();
});
document.getElementById('reset').addEventListener('click',()=>{
  CURRENT_HTML=null; document.getElementById('result').innerHTML='';
  document.getElementById('empty').style.display='block';
  document.getElementById('controls').style.display='none';
  document.getElementById('file').value='';
});
document.getElementById('copyAll').addEventListener('click',()=>{ if(window.__scenes) copyText(exportAll(window.__scenes)); });
document.getElementById('download').addEventListener('click',()=>{
  if(!window.__scenes) return;
  const blob=new Blob([exportAll(window.__scenes)],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='scenes.txt'; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById('modeSeg').addEventListener('click',e=>{
  const b=e.target.closest('button[data-mode]'); if(!b) return; MODE=b.dataset.mode; render();
});

/* drag & drop */
const drop=document.getElementById('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault(); drop.classList.remove('hot');}));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files[0]) readDocx(e.dataTransfer.files[0]); });
</script>
</body>
</html>
